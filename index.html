<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineVerse Booking</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🎬 CineVerse Booking</h1>

    <div class="container">

        <div class="main-content">
           
        <div class="hero-banner">
    <img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?auto=format&fit=crop&w=1600&q=80" alt="Cinema Banner">
    <div class="hero-text">
        <h2>Book Your Favorite Movies</h2>
        <p>Experience movies like never before</p>
    </div>
</div> 

            <div class="movies">

                <div class="movie-card selected" data-price="250">
                    <img src="images/pushpa2.jpg" alt="Pushpa 2">
                    <div class="movie-info">
                        <h3>Pushpa 2</h3>
                        <p class="price">₹250 / Seat</p>
                    </div>
                </div>

                <div class="movie-card" data-price="220">
                    <img src="images/kgf2.jpg" alt="KGF Chapter 2">
                    <div class="movie-info">
                        <h3>KGF Chapter 2</h3>
                        <p class="price">₹220 / Seat</p>
                    </div>
                </div>

                <div class="movie-card" data-price="300">
                    <img src="images/toxic.jpg" alt="Toxic">
                    <div class="movie-info">
                        <h3>Toxic</h3>
                        <p class="price">₹300 / Seat</p>
                    </div>
                </div>

            </div>

           <div class="booking-options">

            <div class="booking-row">

    <div class="booking-option">
        <label>Select Cinema</label>
        <select>
            <option>FM Cineplex</option>
            <option>Connplex</option>
        </select>
    </div>

    <div class="booking-option">
        <label>Select Date</label>
        <input type="date" id="date">
    </div>

    <div class="booking-option">

        <label>Show Time</label>
        <select>
            <option>09:00 AM</option>
            <option>12:00 PM</option>
            <option>03:00 PM</option>
            <option>06:00 PM</option>
        </select>
    </div>



            <div class="screen"></div>

            <h2 style="text-align:center; margin-bottom:15px;">
                Select Your Seats
            </h2>

            <div class="seats" id="seats"></div>

        </div>

        <div class="booking-panel">

            <h2>Booking Summary</h2>

            <div class="summary">
                <p>
    <strong>Cinema:</strong>
    <span id="selectedCinema">FM Cineplex</span>
</p>

<p>
    <strong>Date:</strong>
    <span id="selectedDate">-</span>
</p>

<p>
    <strong>Time:</strong>
    <span id="selectedTime">09:00 AM</span>
</p>


                <p>
                    <strong>Movie:</strong>
                    <span id="movieName">Pushpa 2</span>
                </p>

                <p>
                    <strong>Selected Seats:</strong>
                    <span id="seatCount">0</span>
                </p>

                <p>
                    <strong>Total Amount:</strong>
                    ₹<span id="total">0</span>
                </p>

            </div>

            <button>Confirm Booking</button>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
